<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>Coleção Virtual - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px 30px;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 80px; margin-bottom: 20px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    h1 { color: #1f2937; font-size: 28px; margin-bottom: 10px; font-weight: 700; }
    .status { color: #6b7280; font-size: 16px; margin-bottom: 30px; }
    .status.online { color: #10b981; font-weight: 600; }
    .features { background: #f3f4f6; padding: 20px; border-radius: 12px; margin: 25px 0; text-align: left; }
    .feature { display: flex; align-items: center; margin-bottom: 10px; color: #374151; }
    .feature:last-child { margin-bottom: 0; }
    .check { color: #10b981; font-weight: bold; margin-right: 12px; }
    .btn { padding: 14px 24px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin: 10px 0; width: 100%; transition: all 0.3s; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }
    .btn-secondary { background: #e5e7eb; color: #1f2937; }
    .btn-secondary:hover { background: #d1d5db; }
    .footer { margin-top: 25px; padding-top: 25px; border-top: 1px solid #e5e7eb; color: #9ca3af; font-size: 12px; }
    .status-online { display: none; background: #dcfce7; border: 1px solid #86efac; color: #166534; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; }
    .status-online.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-online" id="onlineStatus">
      ✅ Conexão restaurada! Sincronizando...
    </div>

    <div class="icon">📡</div>
    <h1>Sem Conexão</h1>
    <p class="status">Você está offline, mas pode usar o app normalmente!</p>

    <div class="features">
      <h3 style="margin-bottom: 12px; color: #374151;">✅ Disponível Offline:</h3>
      <div class="feature"><span class="check">✓</span> Ver coleções</div>
      <div class="feature"><span class="check">✓</span> Criar itens</div>
      <div class="feature"><span class="check">✓</span> Adicionar fotos</div>
      <div class="feature"><span class="check">✓</span> Editar itens</div>
      <div class="feature"><span class="check">✓</span> Sincroniza quando online</div>
    </div>

    <button class="btn btn-primary" onclick="goToDashboard()">Acessar Dashboard</button>
    <button class="btn btn-secondary" onclick="checkConnection()">Reconectar</button>

    <div class="footer">
      <p>Coleção Virtual • PWA Offline-First</p>
    </div>
  </div>

  <script>
    // Teste REAL: tenta resolver host a cada 3 segundos
    function checkConnection() {
      fetch('/', { cache: 'no-store', method: 'HEAD', timeout: 3000 }).then(() => {
        document.getElementById('onlineStatus').classList.add('show');
        setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
      }).catch(() => {
        alert('Ainda offline');
      });
    }

    function goToDashboard() {
      window.location.href = '/dashboard';
    }

    // Auto-check a cada 3 segundos
    setInterval(() => {
      if (navigator.onLine) {
        checkConnection();
      }
    }, 3000);

    // Se online, redireciona
    if (navigator.onLine) {
      window.location.href = '/dashboard';
    }
  </script>
</body>
</html>
